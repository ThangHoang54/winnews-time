<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#2a2a2a" rx="48"/>
  
  <!-- Newspaper fold effect -->
  <path d="M 40 60 L 216 60 L 216 196 L 128 196 L 128 220 L 40 196 Z" fill="#f8f5f1" opacity="0.95"/>
  
  <!-- Newspaper lines (header) -->
  <rect x="60" y="80" width="136" height="8" fill="#b91c1c" rx="2"/>
  <rect x="60" y="95" width="100" height="4" fill="#2a2a2a" opacity="0.3" rx="1"/>
  
  <!-- "W" Letter (prominent) -->
  <text x="128" y="160" font-family="serif" font-size="80" font-weight="900" fill="#b91c1c" text-anchor="middle" letter-spacing="-2">W</text>
  
  <!-- Newspaper columns (decorative) -->
  <rect x="60" y="170" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  <rect x="60" y="178" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  <rect x="100" y="170" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  <rect x="100" y="178" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  <rect x="163" y="170" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  <rect x="163" y="178" width="35" height="3" fill="#2a2a2a" opacity="0.2" rx="1"/>
  
  <!-- Shadow/depth effect -->
  <path d="M 128 196 L 128 220 L 40 196" fill="#2a2a2a" opacity="0.15"/>
</svg>