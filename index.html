<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/winnews-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The WinNews Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              'serif': ['Merriweather', 'serif'],
              'sans': ['Lato', 'sans-serif'],
            },
            colors: {
              'paper': '#f8f5f1',
              'ink': '#2a2a2a',
              'accent': '#b91c1c', // red-800
              'dark-paper': '#1f2937', // gray-800
              'dark-ink': '#e5e7eb', // gray-200
              'dark-accent': '#f59e0b', // amber-500
            }
          }
        }
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
